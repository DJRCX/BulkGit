name: Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a tag starting with v, e.g., v1.0.0

permissions:
  contents: write # Required for creating release drafts and uploading assets

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build and Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Will read version from tauri.conf.json, e.g., v0.1.0
          releaseName: 'BulkGit v__VERSION__'
          releaseBody: 'See the assets below to download BulkGit installers for Windows and Linux.'
          releaseDraft: true # Creates a draft release so you can edit details before making it public
          prerelease: false
          args: ${{ matrix.args }}
